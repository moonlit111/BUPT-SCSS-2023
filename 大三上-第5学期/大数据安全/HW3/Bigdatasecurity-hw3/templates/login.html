<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - FIDO2 用户管理系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔓 用户登录</h1>
        </div>

        <div class="form-container">
            <form method="POST" action="{{ url_for('login') }}" class="form">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        required 
                        placeholder="输入用户名"
                    >
                </div>

                <div class="form-group">
                    <label for="password">密码</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        required 
                        placeholder="输入密码"
                    >
                </div>

                <button type="submit" class="btn btn-primary btn-block">
                    登录
                </button>
            </form>

            <div id="status" class="status-message"></div>

            <div class="form-footer">
                <p>还没有账户？<a href="{{ url_for('register') }}">立即注册</a></p>
            </div>
        </div>
    </div>

    <script>
        // 标准 Base64 字符串转 ArrayBuffer
        function base64ToArrayBuffer(base64String) {
            // 处理 URL-safe Base64（如果需要）
            let base64 = base64String.replace(/-/g, '+').replace(/_/g, '/');

            // 添加填充
            while (base64.length % 4) {
                base64 += '=';
            }

            try {
                const binaryString = atob(base64);
                const bytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) {
                    bytes[i] = binaryString.charCodeAt(i);
                }
                return bytes.buffer;
            } catch (e) {
                console.error('Base64 decode error:', e, 'Input:', base64String);
                throw new Error('Failed to decode Base64: ' + e.message);
            }
        }

        // ArrayBuffer 转标准 Base64 字符串
        function arrayBufferToBase64(buffer) {
            let binary = '';
            const bytes = new Uint8Array(buffer);
            for (let i = 0; i < bytes.byteLength; i++) {
                binary += String.fromCharCode(bytes[i]);
            }
            return btoa(binary);
        }

        // 处理认证选项
        function processGetOptions(options) {
            const processed = JSON.parse(JSON.stringify(options));

            // 转换 challenge
            if (processed.publicKey.challenge) {
                processed.publicKey.challenge = base64ToArrayBuffer(processed.publicKey.challenge);
            }

            // 转换 allowCredentials
            if (processed.publicKey.allowCredentials) {
                processed.publicKey.allowCredentials = processed.publicKey.allowCredentials.map(cred => ({
                    type: cred.type,
                    id: base64ToArrayBuffer(cred.id)
                }));
            }

            return processed;
        }

        document.querySelector('form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                // 提交用户名和密码
                const loginResponse = await fetch('/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: 'username=' + encodeURIComponent(username) + '&password=' + encodeURIComponent(password)
                });

                if (!loginResponse.ok) {
                    throw new Error('用户名或密码错误');
                }

                // 获取 FIDO2 认证选项
                const authResponse = await fetch('/fido_auth');
                if (!authResponse.ok) {
                    throw new Error('获取认证选项失败');
                }

                const options = await authResponse.json();
                console.log('Received auth options:', options);

                // 处理选项，将 Base64 转换为 ArrayBuffer
                const processedOptions = processGetOptions(options);
                console.log('Processed auth options:', processedOptions);

                document.getElementById('status').innerHTML = '<div class="info">请使用您的设备进行认证...</div>';

                // 使用 FIDO2 进行认证
                const assertion = await navigator.credentials.get(processedOptions);

                if (!assertion) {
                    throw new Error('用户取消了操作');
                }

                // 完成 FIDO2 认证
                const completeResponse = await fetch('/fido_login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        id: arrayBufferToBase64(assertion.rawId),
                        response: {
                            clientDataJSON: arrayBufferToBase64(assertion.response.clientDataJSON),
                            authenticatorData: arrayBufferToBase64(assertion.response.authenticatorData),
                            signature: arrayBufferToBase64(assertion.response.signature)
                        },
                        type: assertion.type
                    })
                });

                if (completeResponse.ok) {
                    document.getElementById('status').innerHTML = '<div class="success">✅ 登录成功！</div>';
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 1000);
                } else {
                    const error = await completeResponse.json();
                    throw new Error(error.error || '认证失败');
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('status').innerHTML = '<div class="error">❌ 错误: ' + error.message + '</div>';
            }
        });
    </script>
</body>
</html>
